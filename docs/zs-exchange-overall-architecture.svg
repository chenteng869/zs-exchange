<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5c677d}
      .g{fill:#fff;stroke:#d9e2ef;stroke-width:2;rx:18}.gt{font:700 22px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .b{fill:#fff;stroke-width:2;rx:12}.bt{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#15213a}.tx{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#46536b}
      .c{stroke:#69aee8;fill:#ecf7ff}.a{stroke:#6fc58e;fill:#eefaf3}.d{stroke:#f1b45b;fill:#fff6e8}.data{stroke:#a98bea;fill:#f4efff}.ops{stroke:#e68597;fill:#fff0f2}
      .line{stroke:#6b778d;stroke-width:2.4;fill:none;marker-end:url(#arr)}.foot{font:400 15px "Microsoft YaHei",Arial,sans-serif;fill:#56637a}
    </style>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#6b778d"/></marker>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <text class="title" x="70" y="72">ZS Exchange 总体技术架构图</text>
  <text class="sub" x="70" y="108">董事局报备版：用户入口、应用层、核心业务域、数据依赖、生产运维共同构成平台型系统</text>

  <rect class="g" x="55" y="145" width="1490" height="115"/><text class="gt" x="82" y="184">用户与运营入口</text>
  <rect class="b c" x="100" y="205" width="360" height="38"/><text class="bt" x="125" y="230">Web / H5 用户端</text>
  <rect class="b c" x="620" y="205" width="360" height="38"/><text class="bt" x="645" y="230">管理后台</text>
  <rect class="b c" x="1140" y="205" width="360" height="38"/><text class="bt" x="1165" y="230">移动端壳 Capacitor / Android</text>

  <rect class="g" x="55" y="315" width="1490" height="130"/><text class="gt" x="82" y="354">Next.js 应用层</text>
  <rect class="b a" x="100" y="375" width="360" height="48"/><text class="bt" x="125" y="397">页面路由</text><text class="tx" x="125" y="416">src/app：用户端、后台、钱包、交易</text>
  <rect class="b a" x="620" y="375" width="360" height="48"/><text class="bt" x="645" y="397">API Routes</text><text class="tx" x="645" y="416">src/app/api：业务接口、Webhook、健康检查</text>
  <rect class="b a" x="1140" y="375" width="360" height="48"/><text class="bt" x="1165" y="397">组件、状态与 Hooks</text><text class="tx" x="1165" y="416">components / stores / hooks / features</text>

  <rect class="g" x="55" y="500" width="1490" height="255"/><text class="gt" x="82" y="539">核心业务域</text>
  <rect class="b d" x="100" y="565" width="245" height="62"/><text class="bt" x="125" y="590">用户与认证</text><text class="tx" x="125" y="611">JWT / Session / RBAC</text>
  <rect class="b d" x="395" y="565" width="245" height="62"/><text class="bt" x="420" y="590">行情服务</text><text class="tx" x="420" y="611">Ticker / Kline / Depth</text>
  <rect class="b d" x="690" y="565" width="245" height="62"/><text class="bt" x="715" y="590">交易系统</text><text class="tx" x="715" y="611">订单 / 撮合 / 成交 / 冻结</text>
  <rect class="b d" x="985" y="565" width="245" height="62"/><text class="bt" x="1010" y="590">钱包资金系统</text><text class="tx" x="1010" y="611">充值 / 提现 / 热钱包 / 对账</text>
  <rect class="b d" x="1280" y="565" width="220" height="62"/><text class="bt" x="1300" y="590">风控合规</text><text class="tx" x="1300" y="611">KYC / AML / 审计 / 告警</text>
  <rect class="b d" x="250" y="665" width="285" height="62"/><text class="bt" x="275" y="690">Web3 钱包</text><text class="tx" x="275" y="711">多链账户 / 签名 / MPC / 审计</text>
  <rect class="b d" x="660" y="665" width="285" height="62"/><text class="bt" x="685" y="690">DID 身份</text><text class="tx" x="685" y="711">DID / VC / 钱包绑定 / 链上锚定</text>
  <rect class="b d" x="1070" y="665" width="285" height="62"/><text class="bt" x="1095" y="690">DApp 浏览器</text><text class="tx" x="1095" y="711">Provider / Permission / WalletConnect</text>

  <rect class="g" x="55" y="805" width="975" height="125"/><text class="gt" x="82" y="844">数据与外部依赖</text>
  <rect class="b data" x="95" y="870" width="170" height="38"/><text class="bt" x="115" y="895">PostgreSQL</text>
  <rect class="b data" x="300" y="870" width="130" height="38"/><text class="bt" x="325" y="895">Redis</text>
  <rect class="b data" x="465" y="870" width="170" height="38"/><text class="bt" x="485" y="895">区块链 RPC</text>
  <rect class="b data" x="670" y="870" width="140" height="38"/><text class="bt" x="696" y="895">行情源</text>
  <rect class="b data" x="845" y="870" width="130" height="38"/><text class="bt" x="885" y="895">KMS</text>
  <rect class="g" x="1080" y="805" width="465" height="125"/><text class="gt" x="1107" y="844">生产运维与质量门禁</text>
  <rect class="b ops" x="1120" y="870" width="115" height="38"/><text class="bt" x="1143" y="895">Docker</text>
  <rect class="b ops" x="1260" y="870" width="120" height="38"/><text class="bt" x="1276" y="895">监控告警</text>
  <rect class="b ops" x="1405" y="870" width="105" height="38"/><text class="bt" x="1435" y="895">测试</text>

  <path class="line" d="M280 243 V372"/><path class="line" d="M800 243 V372"/><path class="line" d="M1320 243 V372"/>
  <path class="line" d="M800 423 V562"/><path class="line" d="M1010 727 V867"/><path class="line" d="M1210 727 V867"/>
  <text class="foot" x="70" y="968">交付判断：架构资产已成型；生产上线仍需关闭真实资金、密钥、权限、监控、测试与回滚等风险。</text>
</svg>
