      <stop offset="0.42" stop-color="#2A0E12"/>
      <stop offset="1" stop-color="#090706"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8E7A3"/>
      <stop offset="0.45" stop-color="#C99A3D"/>
      <stop offset="1" stop-color="#7D4F14"/>
    </linearGradient>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#451016"/>
      <stop offset="0.52" stop-color="#21090C"/>
      <stop offset="1" stop-color="#0B0706"/>
