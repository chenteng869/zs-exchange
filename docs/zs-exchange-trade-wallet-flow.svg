<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="760" viewBox="0 0 1800 760">
  <defs>
    <style>
      .bg{fill:#fbfcff}.title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5c677d}
      .box{fill:#fff;stroke-width:2;rx:14}.dep{stroke:#5db7de;fill:#eefaff}.tr{stroke:#f0a94a;fill:#fff7ea}.wd{stroke:#8d7bea;fill:#f5f1ff}.risk{stroke:#df6f82;fill:#fff0f3}.audit{stroke:#5eaf78;fill:#effaf3}
      .lb{font:700 17px "Microsoft YaHei",Arial,sans-serif;fill:#15213a}.tx{font:400 13px "Microsoft YaHei",Arial,sans-serif;fill:#4c5870}.ph{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .line{stroke:#68758c;stroke-width:2.4;fill:none;marker-end:url(#arr)}.dash{stroke:#df6f82;stroke-width:2.2;fill:none;stroke-dasharray:8 6;marker-end:url(#arr2)}.note{font:400 15px "Microsoft YaHei",Arial,sans-serif;fill:#56637a}
    </style>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#68758c"/></marker>
    <marker id="arr2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#df6f82"/></marker>
  </defs>
  <rect class="bg" width="1800" height="760"/>
  <text class="title" x="70" y="72">交易与钱包核心闭环图</text>
  <text class="sub" x="70" y="108">技术团队交接版：MVP 必须跑通的注册、充值、交易、提现、审核、签名、对账链路</text>
  <rect x="70" y="145" width="370" height="42" rx="16" fill="#2798c3"/><text class="ph" x="96" y="173">一、用户与充值入账</text>
  <rect x="500" y="145" width="530" height="42" rx="16" fill="#dd922d"/><text class="ph" x="526" y="173">二、交易撮合与清结算</text>
  <rect x="1090" y="145" width="530" height="42" rx="16" fill="#7765d6"/><text class="ph" x="1116" y="173">三、提现审核与链上广播</text>

  <rect class="box dep" x="70" y="230" width="170" height="76"/><text class="lb" x="95" y="257">注册 / 登录</text><text class="tx" x="95" y="280">认证、会话、用户资料</text>
  <rect class="box dep" x="285" y="230" width="170" height="76"/><text class="lb" x="310" y="257">生成充值地址</text><text class="tx" x="310" y="280">用户唯一地址 / 链配置</text>
  <rect class="box dep" x="500" y="230" width="170" height="76"/><text class="lb" x="525" y="257">链上充值</text><text class="tx" x="525" y="280">EVM / TRON / Solana</text>
  <rect class="box dep" x="715" y="230" width="170" height="76"/><text class="lb" x="740" y="257">充值监听</text><text class="tx" x="740" y="280">确认数、幂等、重试</text>
  <rect class="box dep" x="930" y="230" width="170" height="76"/><text class="lb" x="955" y="257">入账</text><text class="tx" x="955" y="280">余额增加 / 流水记录</text>
  <path class="line" d="M240 268 H282"/><path class="line" d="M455 268 H497"/><path class="line" d="M670 268 H712"/><path class="line" d="M885 268 H927"/>

  <rect class="box tr" x="245" y="385" width="170" height="76"/><text class="lb" x="270" y="412">用户下单</text><text class="tx" x="270" y="435">限价 / 市价 / 撤单</text>
  <rect class="box tr" x="475" y="385" width="170" height="76"/><text class="lb" x="500" y="412">冻结余额</text><text class="tx" x="500" y="435">可用转冻结</text>
  <rect class="box tr" x="705" y="385" width="170" height="76"/><text class="lb" x="730" y="412">撮合引擎</text><text class="tx" x="730" y="435">订单簿 / 部分成交</text>
  <rect class="box tr" x="935" y="385" width="170" height="76"/><text class="lb" x="960" y="412">成交记录</text><text class="tx" x="960" y="435">Trade rows / 订单状态</text>
  <rect class="box tr" x="1165" y="385" width="170" height="76"/><text class="lb" x="1190" y="412">清结算</text><text class="tx" x="1190" y="435">余额、手续费、释放冻结</text>
  <path class="line" d="M1015 306 C930 345,470 335,330 382"/><path class="line" d="M415 423 H472"/><path class="line" d="M645 423 H702"/><path class="line" d="M875 423 H932"/><path class="line" d="M1105 423 H1162"/>

  <rect class="box wd" x="610" y="545" width="170" height="76"/><text class="lb" x="635" y="572">提现申请</text><text class="tx" x="635" y="595">金额、地址、链、币种</text>
  <rect class="box risk" x="840" y="545" width="170" height="76"/><text class="lb" x="865" y="572">后台审核</text><text class="tx" x="865" y="595">权限、限额、黑名单</text>
  <rect class="box wd" x="1070" y="545" width="170" height="76"/><text class="lb" x="1095" y="572">KMS/MPC 签名</text><text class="tx" x="1095" y="595">生产不暴露私钥</text>
  <rect class="box wd" x="1300" y="545" width="170" height="76"/><text class="lb" x="1325" y="572">链上广播</text><text class="tx" x="1325" y="595">txHash / 确认 / 失败恢复</text>
  <rect class="box audit" x="1530" y="545" width="170" height="76"/><text class="lb" x="1555" y="572">对账审计</text><text class="tx" x="1555" y="595">资金流水、审计报表</text>
  <path class="line" d="M1250 461 C1220 520,780 500,695 542"/><path class="line" d="M780 583 H837"/><path class="line" d="M1010 583 H1067"/><path class="line" d="M1240 583 H1297"/><path class="line" d="M1470 583 H1527"/>
  <rect class="box risk" x="70" y="545" width="220" height="76"/><text class="lb" x="95" y="572">风控规则</text><text class="tx" x="95" y="595">限额、频率、异常地址、黑名单</text>
  <path class="dash" d="M290 583 H607"/><path class="dash" d="M180 545 C190 475,235 445,245 423"/>
  <text class="note" x="70" y="715">验收口径：脚本可跑、前端可演示、资金可对账、失败可恢复、关键操作可审计。</text>
</svg>
