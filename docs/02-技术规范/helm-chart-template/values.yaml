# =============================================================================
# ZS-AI-Platform Helm Values 配置
# 通用业务服务完整配置
# =============================================================================

# 副本数
replicaCount: 3

image:
  repository: harbor.zs-ai-platform.com/zs-ai-platform
  pullPolicy: IfNotPresent
  # 覆盖镜像 tag (默认使用 Chart.appVersion)
  tag: ""

# 镜像拉取凭证
imagePullSecrets:
  - name: harbor-regcred

# 自动滚动更新
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# 容器名称
nameOverride: ""
fullnameOverride: ""

# 服务账户
serviceAccount:
  create: true
  # 自动挂载 token (推荐 false)
  automount: false
  annotations: {}
  name: ""

# Pod 中断预算
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# 调度约束
nodeSelector: {}
tolerations: []
affinity: {}

# 拓扑分布约束
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: {{ include "zs-ai-platform.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}

# Pod 注解
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
  # ArgoCD 同步
  argocd.argoproj.io/sync-wave: "1"

# Pod 标签
podLabels: {}

# 安全上下文
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
  supplementalGroups: []
  sysctls: []

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL
    add: []

# 资源限制
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
    ephemeral-storage: 10Gi
  requests:
    cpu: 500m
    memory: 1Gi
    ephemeral-storage: 1Gi

# 存活探针
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# 就绪探针
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# 启动探针
startupProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# 容器端口
containerPorts:
  - name: http
    containerPort: 8080
    protocol: TCP
  - name: metrics
    containerPort: 8081
    protocol: TCP
  - name: grpc
    containerPort: 9090
    protocol: TCP

# 自定义命令
command: []
args: []

# 环境变量
env:
  - name: ENV
    value: production
  - name: LOG_LEVEL
    value: info
  - name: TZ
    value: Asia/Shanghai
  - name: POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: POD_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

# 环境变量文件
envFrom:
  - configMapRef:
      name: {{ include "zs-ai-platform.fullname" . }}-env
  - secretRef:
      name: {{ include "zs-ai-platform.fullname" . }}-secret

# 主机名设置
hostNetwork: false
dnsPolicy: ClusterFirst
dnsConfig:
  options:
    - name: ndots
      value: "2"
    - name: single-request-reopen

# 主机别名
hostAliases: []

# Service 配置
service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
  annotations: {}
  labels: {}
  # sessionAffinity
  sessionAffinity: None
  # externalTrafficPolicy
  externalTrafficPolicy: Cluster
  # internalTrafficPolicy
  internalTrafficPolicy: Cluster

# Headless Service
headlessService:
  enabled: true
  ports:
    - name: http
      port: 8080
      targetPort: http

# Ingress 配置
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: api.zs-ai-platform.com
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: http
              port: 80
  tls:
    - hosts:
        - api.zs-ai-platform.com
      secretName: api-tls

# HPA 配置
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

# VPA 配置
verticalPodAutoscaler:
  enabled: false
  updateMode: Auto
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 100m
          memory: 128Mi
        maxAllowed:
          cpu: 4
          memory: 8Gi
        controlledResources: ["cpu", "memory"]

# 持久化存储
persistence:
  enabled: true
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  annotations: {}
  existingClaim: ""
  mountPath: /data
  subPath: ""
  readOnly: false

# 临时存储
emptyDir: {}

# 配置存储
configMap:
  enabled: true
  data:
    application.yaml: |
      server:
        port: 8080
      logging:
        level: info
      database:
        url: jdbc:postgresql://postgres:5432/zs_ai
      cache:
        type: redis
        url: redis://redis:6379

# 密钥
secret:
  enabled: true
  data: {}
  # 引用已有 Secret
  existingSecret: ""
  stringData:
    DB_PASSWORD: "change-me"
    API_KEY: "change-me"

# 持久卷
volumeMounts: []

volumes: []

# NetworkPolicy
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "zs-ai-platform.name" . }}
      ports:
        - protocol: TCP
          port: http
        - protocol: TCP
          port: metrics
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53

# PodDisruptionBudget
podDisruptionBudget:
  enabled: true
  minAvailable: 2
  maxUnavailable: null

# ServiceAccount
serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

# RBAC
rbac:
  create: false
  rules: []

# ServiceMonitor (Prometheus Operator)
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s
  honorLabels: false
  release: kube-prometheus-stack
  additionalLabels: {}
  path: /metrics
  port: metrics
  scheme: http
  tlsConfig: {}
  basicAuth: {}
  bearerTokenFile: ""
  authorization: {}
  metricRelabelings: []
  relabelings: []

# PodMonitor
podMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s
  release: kube-prometheus-stack
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zs-ai-platform.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s

# PrometheusRule (告警规则)
prometheusRule:
  enabled: true
  namespace: monitoring
  release: kube-prometheus-stack
  additionalLabels: {}
  rules:
    - alert: HighCPUUsage
      expr: |
        sum(rate(container_cpu_usage_seconds_total{pod=~"{{ include "zs-ai-platform.fullname" . }}-.*"}[5m])) by (pod) > 0.8
      for: 5m
      labels:
        severity: warning
        team: sre
      annotations:
        summary: "Pod {{ $labels.pod }} CPU 使用率过高"
        description: "Pod {{ $labels.pod }} CPU 使用率 > 80% 持续 5 分钟"
    - alert: HighMemoryUsage
      expr: |
        sum(container_memory_working_set_bytes{pod=~"{{ include "zs-ai-platform.fullname" . }}-.*"}) by (pod) > 2 * 1024 * 1024 * 1024
      for: 5m
      labels:
        severity: critical
        team: sre
      annotations:
        summary: "Pod {{ $labels.pod }} 内存使用过高"
        description: "Pod {{ $labels.pod }} 内存使用 > 2GB 持续 5 分钟"
    - alert: PodCrashLooping
      expr: |
        rate(kube_pod_container_status_restarts_total{pod=~"{{ include "zs-ai-platform.fullname" . }}-.*"}[10m]) * 60 > 0
      for: 5m
      labels:
        severity: warning
        team: sre
      annotations:
        summary: "Pod {{ $labels.pod }} 频繁重启"
        description: "Pod {{ $labels.pod }} 10 分钟内多次重启"
    - alert: PodNotReady
      expr: |
        kube_pod_status_ready{pod=~"{{ include "zs-ai-platform.fullname" . }}-.*", condition="true"} == 0
      for: 10m
      labels:
        severity: critical
        team: sre
      annotations:
        summary: "Pod {{ $labels.pod }} 长时间未就绪"
        description: "Pod {{ $labels.pod }} 10 分钟内未就绪"

# PDB
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# 镜像仓库镜像 (multi-arch)
imageRegistry: harbor.zs-ai-platform.com
imageRepository: ""

# Lifecycle Hooks
lifecycle:
  preStop:
    exec:
      command:
        - /bin/sh
        - -c
        - "sleep 15"

# 优雅停止时间
terminationGracePeriodSeconds: 30

# 日志配置
logging:
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"
