<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="900" viewBox="0 0 1700 900">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.sub{font:400 18px "Microsoft YaHei",Arial,sans-serif;fill:#5c677d}
      .g{fill:#fff;stroke:#dbe4f0;stroke-width:2;rx:18}.gt{font:700 22px "Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .b{fill:#fff;stroke-width:2;rx:13}.gate{stroke:#5d9cec;fill:#eef6ff}.run{stroke:#63b77c;fill:#effaf3}.obs{stroke:#f0a64b;fill:#fff7ea}.sec{stroke:#df7183;fill:#fff0f3}
      .lb{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#15213a}.tx{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#4c5870}
      .line{stroke:#68758c;stroke-width:2.5;fill:none;marker-end:url(#arr)}.red{stroke:#df7183;stroke-width:2.5;fill:none;marker-end:url(#arr2)}.note{font:400 15px "Microsoft YaHei",Arial,sans-serif;fill:#56637a}
    </style>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#68758c"/></marker>
    <marker id="arr2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#df7183"/></marker>
  </defs>
  <rect class="bg" width="1700" height="900"/>
  <text class="title" x="70" y="72">生产部署与监控架构图</text>
  <text class="sub" x="70" y="108">上线评审版：开发门禁、预生产、灰度、生产运行态、监控告警、回滚与安全审计</text>
  <rect class="g" x="55" y="150" width="1590" height="165"/><text class="gt" x="82" y="190">发布流水线与质量门禁</text>
  <rect class="b gate" x="95" y="220" width="185" height="66"/><text class="lb" x="120" y="246">开发 / 测试</text><text class="tx" x="120" y="269">feature / fix / review</text>
  <rect class="b gate" x="335" y="220" width="205" height="66"/><text class="lb" x="360" y="246">CI 门禁</text><text class="tx" x="360" y="269">type-check / test:p0</text>
  <rect class="b gate" x="595" y="220" width="205" height="66"/><text class="lb" x="620" y="246">构建镜像</text><text class="tx" x="620" y="269">Docker Image / tag</text>
  <rect class="b gate" x="855" y="220" width="205" height="66"/><text class="lb" x="880" y="246">预生产环境</text><text class="tx" x="880" y="269">配置、数据、依赖验证</text>
  <rect class="b gate" x="1115" y="220" width="205" height="66"/><text class="lb" x="1140" y="246">冒烟检查</text><text class="tx" x="1140" y="269">health:routes / health:p0</text>
  <rect class="b gate" x="1375" y="220" width="205" height="66"/><text class="lb" x="1400" y="246">灰度发布</text><text class="tx" x="1400" y="269">1% → 10% → 50% → 100%</text>
  <path class="line" d="M280 253 H332"/><path class="line" d="M540 253 H592"/><path class="line" d="M800 253 H852"/><path class="line" d="M1060 253 H1112"/><path class="line" d="M1320 253 H1372"/>

  <rect class="g" x="55" y="380" width="760" height="345"/><text class="gt" x="82" y="420">生产运行态</text>
  <rect class="b run" x="95" y="455" width="245" height="75"/><text class="lb" x="120" y="482">Next.js 服务</text><text class="tx" x="120" y="505">API、页面、业务服务入口</text>
  <rect class="b run" x="430" y="455" width="245" height="75"/><text class="lb" x="455" y="482">PostgreSQL</text><text class="tx" x="455" y="505">用户、订单、钱包、审计</text>
  <rect class="b run" x="95" y="585" width="245" height="75"/><text class="lb" x="120" y="612">Redis</text><text class="tx" x="120" y="635">缓存、队列、会话、限流</text>
  <rect class="b run" x="430" y="585" width="245" height="75"/><text class="lb" x="455" y="612">主备 RPC</text><text class="tx" x="455" y="635">EVM / Solana / TRON 节点</text>
  <rect class="b run" x="260" y="665" width="245" height="45"/><text class="lb" x="285" y="695">KMS / MPC 生产签名</text>
  <path class="line" d="M1530 286 C1525 360,620 365,220 452"/><path class="line" d="M340 492 H427"/><path class="line" d="M217 530 V582"/><path class="line" d="M340 500 C390 540,420 560,475 582"/><path class="line" d="M340 522 C365 575,370 628,382 662"/>

  <rect class="g" x="885" y="380" width="760" height="345"/><text class="gt" x="912" y="420">可观测、告警与应急</text>
  <rect class="b obs" x="925" y="455" width="220" height="75"/><text class="lb" x="950" y="482">Prometheus</text><text class="tx" x="950" y="505">指标采集 / 规则加载</text>
  <rect class="b obs" x="1210" y="455" width="220" height="75"/><text class="lb" x="1235" y="482">Grafana 看板</text><text class="tx" x="1235" y="505">交易、钱包、RPC、签名</text>
  <rect class="b obs" x="925" y="585" width="220" height="75"/><text class="lb" x="950" y="612">告警通道</text><text class="tx" x="950" y="635">飞书 / 邮件 / Pager</text>
  <rect class="b obs" x="1210" y="585" width="220" height="75"/><text class="lb" x="1235" y="612">日志与审计</text><text class="tx" x="1235" y="635">业务日志、资金日志、审计链</text>
  <rect class="b sec" x="1065" y="675" width="260" height="45"/><text class="lb" x="1090" y="705">一键回滚：5 分钟恢复</text>
  <path class="line" d="M675 492 C790 490,825 490,922 492"/><path class="line" d="M675 622 C790 585,825 530,922 500"/><path class="line" d="M505 690 C735 735,890 715,1062 700"/><path class="line" d="M1145 492 H1207"/><path class="line" d="M1035 530 V582"/><path class="line" d="M1320 530 V582"/><path class="red" d="M1035 660 C1040 690,1048 702,1062 700"/><path class="red" d="M1320 660 C1300 690,1290 702,1325 700"/>

  <rect class="g" x="55" y="775" width="1590" height="85"/><text class="gt" x="82" y="813">上线红线</text>
  <text class="note" x="82" y="843">明文私钥、默认 JWT、未鉴权 Admin、未验证充值提现、无监控告警、无回滚演练，任一存在不得进入生产发布。</text>
</svg>
