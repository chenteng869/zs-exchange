# =============================================================================
# ZS Exchange 本地虚拟部署 - 核心服务（轻量版）
# 启动：docker compose --env-file .env -f docker-compose.core.yml up -d
# =============================================================================

version: "3.9"

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ============================================================
  # 1. PostgreSQL 16 - 业务核心数据库
  # ============================================================
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: zs_postgres
    environment:
      POSTGRES_USER: zs_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zs_exchange
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./conf/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zs_admin -d zs_exchange"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  # ============================================================
  # 2. Redis 7 - 缓存/队列
  # ============================================================
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: zs_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 384mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # ============================================================
  # 3. n8n - 工作流引擎（Queue Mode 主实例）
  # ============================================================
  n8n:
    <<: *common
    image: n8nio/n8n:1.94.1
    container_name: zs_n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: zs_admin
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_USER_MANAGEMENT_DISABLED: "true"
      GENERIC_TIMEZONE: Asia/Shanghai
      N8N_DEFAULT_LOCALE: zh-CN
      N8N_SECURE_COOKIE: "false"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
    ports:
      - "${N8N_PORT}:5678"
    volumes:
      - ./data/n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 256m

  # ============================================================
  # 4. n8n-init - 自动创建 n8n 数据库
  # ============================================================
  n8n-db-init:
    image: postgres:16-alpine
    container_name: zs_n8n_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        psql -h postgres -U zs_admin -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'n8n_db'" | grep -q 1 || \
        psql -h postgres -U zs_admin -d postgres -c "CREATE DATABASE n8n_db"
    restart: "no"

  # ============================================================
  # 5. ZS Exchange 应用（使用 next.js dev 模式）
  # ============================================================
  zs-app:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/local-deploy/Dockerfile.zs
    container_name: zs_app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://zs_admin:${POSTGRES_PASSWORD}@postgres:5432/zs_exchange
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      N8N_BASE_URL: http://n8n:5678
    ports:
      - "3001:3000"
    volumes:
      - ../../src:/app/src
      - ../../public:/app/public
      - ../../package.json:/app/package.json
      - ../../next.config.js:/app/next.config.js
      - ../../tsconfig.json:/app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  # ============================================================
  # 6. Web 管理工具（Adminer）- 数据库可视化
  # ============================================================
  adminer:
    <<: *common
    image: adminer:latest
    container_name: zs_adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  # ============================================================
  # 7. Redis Insight - Redis 可视化
  # ============================================================
  redis-insight:
    <<: *common
    image: redis/redisinsight:latest
    container_name: zs_redis_insight
    ports:
      - "8001:8001"
    volumes:
      - ./data/redis-insight:/db
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  default:
    name: zs_net
    driver: bridge
