global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'zs-postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'zs-redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'zs-n8n'
    static_configs:
      - targets: ['n8n:5678']

  - job_name: 'zs-app'
    static_configs:
      - targets: ['zs-app:3000']
