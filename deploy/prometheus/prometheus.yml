# ============================================================
# Prometheus 配置
# 监控目标：Web 应用、Node Exporter、PostgreSQL Exporter
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'stock-exchange'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # ---------- Web 应用 (Next.js) ----------
  - job_name: 'nextjs-app'
    static_configs:
      - targets: ['web:9464']
    metrics_path: '/metrics'
    scrape_interval: 10s
    honor_labels: true

  # ---------- Node Exporter (主机指标) ----------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # ---------- 撮合引擎性能指标 ----------
  - job_name: 'matching-engine'
    static_configs:
      - targets: ['web:9464']
    metrics_path: '/api/metrics/matching'
    scrape_interval: 5s
    scrape_timeout: 4s

  # ---------- PostgreSQL Exporter ----------
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # ---------- Redis Exporter ----------
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s
