# ============================================================
# Prometheus 告警规则
# 监控：应用可用性、数据库、系统资源、交易系统
# ============================================================

groups:
  # ---------- 应用可用性 ----------
  - name: application
    rules:
      - alert: WebAppDown
        expr: up{job="nextjs-app"} == 0
        for: 1m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "Web 应用宕机"
          description: "Next.js 应用已停止响应超过 1 分钟"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "高错误率"
          description: "5xx 错误率超过 5%，持续 5 分钟以上"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "接口响应慢"
          description: "P95 响应时间超过 1 秒"

  # ---------- 数据库 ----------
  - name: database
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "PostgreSQL 宕机"
          description: "PostgreSQL 数据库不可用"

      - alert: HighConnectionUsage
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "数据库连接使用率高"
          description: "连接数超过 80%"

      - alert: SlowQueries
        expr: rate(pg_stat_statements_total_time_seconds[5m]) > 10
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "慢查询增多"
          description: "数据库查询时间异常增长"

  # ---------- 系统资源 ----------
  - name: system
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "CPU 使用率过高"
          description: "CPU 使用率超过 85%，持续 5 分钟"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "内存使用率过高"
          description: "内存使用率超过 85%"

      - alert: HighDiskUsage
        expr: (1 - node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 > 85
        for: 10m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "磁盘使用率过高"
          description: "磁盘空间使用率超过 85%"

      - alert: DiskFullPrediction
        expr: predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"}[1h], 24*3600) < 0
        for: 30m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "磁盘即将写满"
          description: "按当前速率，24 小时内磁盘将耗尽"

  # ---------- 交易系统 ----------
  - name: trading
    rules:
      - alert: MatchingEngineHighLatency
        expr: matching_engine_latency_p99 > 1000000
        for: 5m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "撮合引擎延迟高"
          description: "P99 撮合延迟超过 1ms"

      - alert: OpenInterestSpike
        expr: rate(open_interest_total[15m]) > 0.1
        for: 15m
        labels:
          severity: info
          category: trading
        annotations:
          summary: "持仓量快速增长"
          description: "15 分钟内持仓量增长超过 10%"

      - alert: InsuranceFundLow
        expr: insurance_fund_balance / avg_over_time(insurance_fund_balance[7d]) < 0.5
        for: 10m
        labels:
          severity: critical
          category: trading
        annotations:
          summary: "保险基金不足"
          description: "保险基金余额低于 7 日均值的 50%"

      - alert: LiquidationSpike
        expr: rate(liquidations_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "强平数量激增"
          description: "5 分钟内强平超过 10 笔"

      - alert: PriceFuseTriggered
        expr: price_fuse_active == 1
        for: 0m
        labels:
          severity: warning
          category: trading
        annotations:
          summary: "价格熔断触发"
          description: "{{ $labels.symbol }} 触发价格熔断"
