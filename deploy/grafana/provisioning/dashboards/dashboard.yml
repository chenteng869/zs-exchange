# ============================================================
# Grafana 仪表盘自动加载配置
# ============================================================

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Stock Exchange'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
